<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcomo to Kokoa</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
  </head>
  <body>
    <div id="status-bar">
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <!-- To Do: Wifi Icon -->
        <i class="fas fa-wifi"></i>
      </div>
      <div class="status-bar__column">
        <span>18:40</span>
      </div>
      <div class="status-bar__column">
        <span>11%</span>
        <!-- Battery Icon -->
        <!-- Lightning Icon -->
        <i class="fas fa-battery-full fa-lg"></i>
        <i class="fas fa-bolt "></i>
      </div>
    </div>
    </div>
    <header class="welcome-header">

        <h1 class="welcome-header__title">Welcome To Kakao</h1>
        <p class="welcome-header__text">If you have a Kokoa Account, log in with you</p>
    </header>
 
        <form action="friends.html" method="get" id="login-form">
        

            <input name="username" type="text" placeholder="Email or phone"/>
            <input  name="password" type="password" placeholder="Password"/>
            <input  type="submit" value="Log In"/>
            <a href="#">Find Kokoa Account or Password</a>
        </form>
        
  </body>
</html>
