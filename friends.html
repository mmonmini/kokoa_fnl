<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends - Kokoa</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <body>
    <div id="status-bar">
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <!-- To Do: Wifi Icon -->
        <i class="fas fa-wifi"></i>
      </div>
      <div class="status-bar__column">
        <span>18:40</span>
      </div>
      <div class="status-bar__column">
        <span>11%</span>
        <!-- Battery Icon -->
        <!-- Lightning Icon -->
        <i class="fas fa-battery-full fa-lg"></i>
        <i class="fas fa-bolt "></i>
      </div>
    </div>
    </div>
    <header class="screen-header">
        <h1 class="screen-header__title">Friends</h1>
        <div class="screen-header__icons">
            <span><i class="fa-solid fa-magnifying-glass fa-lg"></i></span>
            <span><i class="fa-solid fa-music fa-lg"></i></span>
            <span><i class="fa-solid fa-gear fa-lg"></i></span>
        </div>
        
     
    </header>
    <a id="friends-display-link">
        <i class="fa-solid fa-circle-info"></i>Friends' Names Display<i class="fa-solid fa-chevron-right fa-xs"></i>
    </a>
    <main class="friends-screen">
         <div class="user-component">
        <div class="user-component__column">
            <img src="https://github.com/mmonmini/html2026_pg/blob/main/character0.png?raw=true" 
            class="user-component__avatar user-component__avatar--xl" alt="">
            <div class="user-component__text">
                <h4 class="user-component__title">MINI</h4>
                <!--<h6 class="user-component__subtitle">this text whatever</h6>-->
            </div>
        </div>
        <div class="user-component__column"></div>

    </div>
    <div class="friends-screen__channel">
        <div class="friends-screen__channel-header">
            <span>Channel</span><i class="fa-solid fa-chevron-up fa-xs"></i>
        </div>
            <div class="user-component">
        <div class="user-component__column">
            <img src="https://github.com/mmonmini/html2026_pg/blob/main/character0.png?raw=true" 
            class="user-component__avatar user-component__avatar--sm" alt="">
            <div class="user-component__text">
                <h4 class=" user-component__title user-component__title--not-bold ">Channel</h4>
                <!--<h6 class="user-component__subtitle">this text whatever</h6>-->
            </div>
        </div>
        <div class="user-component__column">
            <span>2 <i class="fa-solid fa-chevron-right fa-xs"></i></span>
        </div>

    </div>

    </div>
    </main>
